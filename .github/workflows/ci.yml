name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  pack:
    name: pack (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Print dotnet info
        run: dotnet --info

      - name: Pack all SDKs
        shell: bash
        run: |
          VERSION="0.1.0-ci.${{ github.run_number }}+${GITHUB_SHA::7}"
          dotnet pack build/Cadenza.Packaging.proj \
            -c Release \
            -o ./artifacts \
            -p:Version="${VERSION}" \
            -p:RepositoryCommit="${GITHUB_SHA}"

      - name: List artifacts
        shell: bash
        run: ls -la ./artifacts

      - name: Upload nupkgs
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ github.run_number }}
          path: ./artifacts/*.nupkg
          if-no-files-found: error
